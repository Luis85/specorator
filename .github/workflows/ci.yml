name: CI

on:
  push:
    branches: [develop, demo, main]
  pull_request:
    branches: [develop, demo, main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  workflow-lint:
    name: Lint workflow files (actionlint)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install actionlint
        run: |
          bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.12/scripts/download-actionlint.bash) 1.7.12
      - name: Run actionlint
        run: ./actionlint -color
      - name: Verify third-party actions are SHA-pinned
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(find .github/workflows -maxdepth 1 -type f \( -name '*.yml' -o -name '*.yaml' \) | sort)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No workflow files found under .github/workflows."
            exit 0
          fi
          violations=$(grep -nE '^[[:space:]]*-?[[:space:]]*uses:' "${files[@]}" \
            | grep -vE 'uses:[[:space:]]*\./' \
            | grep -vE 'uses:[[:space:]]*docker://' \
            | grep -vE 'uses:[[:space:]]*[^@[:space:]]+@[0-9a-f]{40}([[:space:]]|$)' \
            || true)
          if [ -n "$violations" ]; then
            echo "::error::Unpinned actions found — every 'uses:' must reference a 40-character commit SHA (see docs/security/supply-chain.md)."
            echo "$violations"
            exit 1
          fi
          echo "All third-party actions are SHA-pinned."

  guard:
    name: Verify PR source is develop
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Reject non-develop source
        if: github.head_ref != 'develop'
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          echo "::error::PRs to main must come from 'develop' (got '$HEAD_REF')"
          exit 1
      - name: Confirm develop source
        if: github.head_ref == 'develop'
        run: |
          echo "OK: PR source is develop"

  verify:
    name: Install, typecheck, lint, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --audit-level=high --omit=dev

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build (plugin)
        run: npm run build

      - name: Build (standalone UI)
        run: npm run build:web

      - name: Generate API docs
        run: npm run docs:api
