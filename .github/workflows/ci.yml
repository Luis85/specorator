name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Install, typecheck, and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      # Lint — pending until ESLint is configured (issue #17)
      # - name: Lint
      #   run: npm run lint

      # Tests — pending until Vitest is configured (issue #18)
      # - name: Test
      #   run: npm run test

      - name: Build
        run: npm run build
