name: CI

on:
  push:
    branches: [develop, demo, main]
  pull_request:
    branches: [develop, demo, main]

jobs:
  workflow-lint:
    name: Lint workflow files (actionlint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install actionlint
        run: |
          bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.12/scripts/download-actionlint.bash) 1.7.12
      - name: Run actionlint
        run: ./actionlint -color

  guard:
    name: Verify PR source is develop
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Reject non-develop source
        if: github.head_ref != 'develop'
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          echo "::error::PRs to main must come from 'develop' (got '$HEAD_REF')"
          exit 1
      - name: Confirm develop source
        if: github.head_ref == 'develop'
        run: |
          echo "OK: PR source is develop"

  verify:
    name: Install, typecheck, lint, test, and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build (plugin)
        run: npm run build

      - name: Build (standalone UI)
        run: npm run build:web

      - name: Generate API docs
        run: npm run docs:api
