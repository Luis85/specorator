name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Verify tag is on main HEAD
        run: |
          git fetch origin main
          MAIN_SHA=$(git rev-parse origin/main)
          if [ "$GITHUB_SHA" != "$MAIN_SHA" ]; then
            echo "Release tag must point to the current main HEAD ($MAIN_SHA), got $GITHUB_SHA"
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build plugin
        run: npm run build

      - name: Verify manifest, package, and versions.json all match tag
        run: |
          TAG_VERSION="$GITHUB_REF_NAME"
          MANIFEST_VERSION="$(node -p "require('./manifest.json').version")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          VERSIONS_HAS_TAG="$(node -p "require('./versions.json')['$TAG_VERSION'] || ''")"
          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "Tag ($TAG_VERSION) does not match manifest.json version ($MANIFEST_VERSION)"
            exit 1
          fi
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)"
            exit 1
          fi
          if [ -z "$VERSIONS_HAS_TAG" ]; then
            echo "versions.json has no entry for $TAG_VERSION — add one mapping the version to its minAppVersion"
            exit 1
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: |
            manifest.json
            main.js
            styles.css
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
